services:
  gateway:
    build: .
    ports:
      - "8642:8642"
    env_file:
      - .env
    volumes:
      # Persist the audit log outside the container
      - ./logs:/app/logs
      # Mount host Claude credentials so the CLI is authenticated
      - ~/.claude:/root/.claude:ro
      - ~/.claude.json:/root/.claude.json:ro
    restart: unless-stopped
